name: LypusOS ISO Build CI/CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-iso:
    name: Build LypusOS ISO
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Pacman & Archiso Packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/pacman/pkg
            /var/lib/pacman
          key: ${{ runner.os }}-pacman-${{ hashFiles('profile/packages.x86_64') }}
          restore-keys: |
            ${{ runner.os }}-pacman-

      - name: System Update & Install Archiso
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso git sudo bash

      - name: Build LypusOS ISO
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload ISO Artifact (Retained 90 Days)
        uses: actions/upload-artifact@v4
        with:
          name: LypusOS-ISO
          path: out/*.iso
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.iso
          body: |
            ## LypusOS Release
            Built automatically by **KERNEL FORGE** GitHub Actions CI/CD.
            
            - **Base**: Arch Linux
            - **Desktop**: Hyprland (Dank Shell optimized)
            - **AUR Helper**: yay
            - **GPU**: NVIDIA & AMD Out-of-the-box support
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
